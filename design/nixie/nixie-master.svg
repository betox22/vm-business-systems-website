<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-label="Nixie layered avatar master source">
  <metadata>
    Nixie layered character master. Character-only source based on the supplied concept sheet.
    Hidden state groups are intended for animation states: idle, listening, thinking, speaking, building, success, alert.
  </metadata>
  <defs>
    <linearGradient id="nixieSkin" x1="210" y1="80" x2="480" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8ffff"/>
      <stop offset="0.22" stop-color="#66f8f1"/>
      <stop offset="0.52" stop-color="#8f6dff"/>
      <stop offset="0.78" stop-color="#39ddd0"/>
      <stop offset="1" stop-color="#7b67ff"/>
    </linearGradient>
    <linearGradient id="nixieEdge" x1="190" y1="90" x2="500" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142f77"/>
      <stop offset="0.5" stop-color="#513397"/>
      <stop offset="1" stop-color="#0c1b53"/>
    </linearGradient>
    <linearGradient id="nixieAlertSkin" x1="240" y1="120" x2="500" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe7cf"/>
      <stop offset="0.45" stop-color="#c07cff"/>
      <stop offset="0.74" stop-color="#ff976b"/>
      <stop offset="1" stop-color="#46216c"/>
    </linearGradient>
    <radialGradient id="nixieGlow" cx="48%" cy="43%" r="58%">
      <stop offset="0" stop-color="#bfffff" stop-opacity="0.78"/>
      <stop offset="0.42" stop-color="#4df4ec" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#5b42d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeCyan" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#efffff"/>
      <stop offset="0.55" stop-color="#77fff5"/>
      <stop offset="1" stop-color="#12245d"/>
    </radialGradient>
    <radialGradient id="eyeAlert" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#fff7b2"/>
      <stop offset="0.55" stop-color="#ffb35d"/>
      <stop offset="1" stop-color="#32144f"/>
    </radialGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <style>
      .stroke-main{stroke:url(#nixieEdge);stroke-width:9;stroke-linejoin:round;stroke-linecap:round}
      .state{display:none}
      .export-note{display:none}
    </style>
  </defs>

  <g id="nixie-character-master">
