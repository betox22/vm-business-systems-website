<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nixie Web Avatar</title>
    <link rel="stylesheet" href="/public/brand/nixie/nixie-web-avatar.css">
  </head>
  <body class="nixie-web-scene">
    <main class="nixie-web-shell">
      <section class="nixie-copy">
        <span>Original concept based avatar</span>
        <h1>Nixie, animation-ready AI assistant</h1>
        <p>State-based avatar built from the real Nixie concept poses: listening, thinking, speaking, building, optimizing, success, and alert.</p>
        <div class="nixie-status-card">
          <strong id="nixieStateTitle">Nixie is ready</strong>
          <small id="nixieStateText">Fluid assistant mode with the original Nixie shape and glow.</small>
        </div>
        <div class="nixie-controls" aria-label="Nixie animation states">
          <button type="button" data-state="idle">Idle</button>
          <button type="button" data-state="listening">Listening</button>
          <button type="button" data-state="thinking">Thinking</button>
          <button type="button" data-state="speaking">Speaking</button>
          <button type="button" data-state="building">Building</button>
          <button type="button" data-state="optimization">Optimize</button>
          <button type="button" data-state="success">Success</button>
          <button type="button" data-state="alert">Alert</button>
        </div>
      </section>
      <section>
        <div id="nixieAvatar"></div>
      </section>
    </main>
    <script src="/public/brand/nixie/nixie-web-avatar.js"></script>
    <script>
      const title = document.querySelector("#nixieStateTitle");
      const text = document.querySelector("#nixieStateText");
      const buttons = Array.from(document.querySelectorAll("[data-state]"));
      const avatar = new window.NixieWebAvatar("#nixieAvatar", {
        state: "idle",
        onStateChange(state, label) {
          title.textContent = label.title;
          text.textContent = label.text;
          buttons.forEach((button) => button.classList.toggle("active", button.dataset.state === state));
        },
      });
      buttons.forEach((button) => {
        button.addEventListener("click", () => avatar.setState(button.dataset.state));
      });
    </script>
  </body>
</html>
