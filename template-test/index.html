<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explorar templates AI</title>
    <link rel="stylesheet" href="/client.css?v=4">
    <link rel="stylesheet" href="/ai-builder.css?v=22">
    <style>
      body { margin: 0; background: #f6f8fb; color: #101828; font-family: Inter, system-ui, sans-serif; }
      .test-shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 32px 0; }
      .test-hero { display: grid; gap: 16px; margin-bottom: 22px; }
      .test-hero h1 { margin: 0; font-size: clamp(32px, 5vw, 56px); line-height: 1; }
      .test-panel { border: 1px solid #dbe3ef; border-radius: 12px; padding: 16px; background: #fff; box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08); }
      .test-form { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
      .test-form textarea { min-height: 118px; resize: vertical; border: 1px solid #d0d5dd; border-radius: 16px; padding: 14px 16px; font: inherit; }
      .test-actions { display: grid; gap: 8px; }
      .test-form button, .template-card button, .template-card a { border: 0; border-radius: 999px; padding: 12px 16px; background: #155eef; color: #fff; font-weight: 900; cursor: pointer; text-align: center; }
      .template-card a { background: #101828; text-decoration: none; }
      .result-grid { display: grid; grid-template-columns: minmax(260px, 360px) 1fr; gap: 18px; margin-top: 18px; align-items: start; }
      .meta-list { display: grid; gap: 10px; }
      .meta-list div { border: 1px solid #e4e7ec; border-radius: 8px; padding: 10px; background: #fcfcfd; }
      .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; margin-top: 18px; }
      .template-card { border: 1px solid #e4e7ec; border-radius: 10px; padding: 14px; background: #fff; display: grid; gap: 8px; }
      .template-card.active { border-color: #155eef; box-shadow: 0 18px 50px rgba(21, 94, 239, 0.16); }
      .template-card small { color: #667085; font-weight: 800; text-transform: uppercase; }
      .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
      .tag-row span { border-radius: 999px; padding: 5px 8px; background: #eff4ff; color: #155eef; font-size: 12px; font-weight: 800; }
      .status-note { color: #667085; font-size: 14px; }
      .error-note { color: #b42318; font-weight: 800; }
      @media (max-width: 860px) { .test-form, .result-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="test-shell">
      <section class="test-hero">
        <a href="/start/">← Volver al inicio</a>
        <h1>Explorar templates AI</h1>
        <p>Elige una plantilla manualmente o describe lo que quieres. Ejemplo: “quiero una tienda cyberpunk super cool con productos gamer”.</p>
      </section>

      <section class="test-panel">
        <div class="test-form">
          <textarea id="promptInput">quiero una tienda cyberpunk super cool con productos gamer, colores neon y estilo futurista</textarea>
          <div class="test-actions">
            <button id="detectButton" type="button">Detectar template</button>
            <button id="openBuilderButton" type="button">Generar con esta descripcion</button>
          </div>
        </div>
        <p class="status-note" id="statusNote">Cargando galeria de templates...</p>
        <div class="result-grid">
          <aside class="meta-list" id="resultMeta"></aside>
          <section id="previewMount"></section>
        </div>
      </section>

      <h2>Templates disponibles</h2>
      <section class="template-grid" id="templateGrid"></section>
    </main>

    <script src="/template-router.js?v=3"></script>
    <script src="/template-test/template-test.js?v=2"></script>
  </body>
</html>
