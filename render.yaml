services:
  - type: web
    name: luma-ai-builder-api
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_CHAT_TIMEOUT
        value: 18
      - key: ALLOW_DEV_AI_MOCK
        value: false
      - key: ALLOWED_ORIGINS
        value: https://vmbusinesssystems.com,https://www.vmbusinesssystems.com
      - key: DEFAULT_ROOT_DOMAIN
        value: vmbusinesssystems.com
      - key: PUBLIC_SITE_BASE_URL
        value: https://vmbusinesssystems.com/site.html
      - key: PUBLIC_ROOT_DOMAIN
        value: vmbusinesssystems.com
      - key: DOMAIN_PROVIDER
        value: suggestions
      - key: DOMAIN_INCLUDED_MAX_USD
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ADMIN_ALLOWED_EMAILS
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
