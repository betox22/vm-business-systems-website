    <g id="state-alert" class="state">
      <path id="alert-tint" d="M231 247 C205 164 239 99 315 76 C368 60 409 79 438 43 C455 22 477 33 473 61 C469 101 508 101 526 82 C544 62 568 79 555 108 C544 135 572 147 597 132 C619 119 638 138 626 162 C612 191 635 209 665 198 C688 190 701 214 683 237 C651 279 610 309 562 323 C493 344 432 329 371 360 C315 389 256 345 231 247 Z" fill="url(#nixieAlertSkin)" opacity="0.58"/>
