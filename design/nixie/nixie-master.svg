      <path d="M349 440 L326 459 L349 479" fill="none" stroke="#eaffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M388 440 L411 459 L388 479" fill="none" stroke="#eaffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M377 431 L354 491" fill="none" stroke="#eaffff" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g id="layer-particles" opacity="0.88">
