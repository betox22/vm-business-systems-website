        <path d="M217 369 v26"/>
        <path d="M568 120 h28"/>
        <path d="M582 106 v28"/>
        <path d="M616 555 h26"/>
        <path d="M629 542 v26"/>
      </g>
    </g>

    <g id="state-idle" class="export-note">
      <desc>Default visible pose. Use base layers with mouth closed and idle floating transform.</desc>
    </g>

    <g id="state-listening" class="state">
