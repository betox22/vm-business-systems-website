        <circle cx="190" cy="280" r="6"/>
        <circle cx="224" cy="188" r="4"/>
        <circle cx="586" cy="272" r="5"/>
        <circle cx="617" cy="398" r="4"/>
        <circle cx="222" cy="560" r="4"/>
        <circle cx="514" cy="596" r="6"/>
      </g>
      <g fill="none" stroke="#b58cff" stroke-width="6" stroke-linecap="round">
