<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Published site</title>
    <link rel="stylesheet" href="ai-builder.css?v=67">
    <style>
      body {
        margin: 0;
        background: #fff;
      }

      .site-preview {
        min-height: 100vh;
      }

      .public-empty {
        display: grid;
        min-height: 100vh;
        place-items: center;
        color: #667085;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .lead-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(15, 23, 42, 0.58);
      }

      .lead-modal-card {
        width: min(460px, 100%);
        display: grid;
        gap: 12px;
        padding: 18px;
        border-radius: 14px;
        background: #fff;
        color: #111827;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.26);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .lead-modal-card > div {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .lead-modal-card label {
        display: grid;
        gap: 6px;
        color: #475467;
        font-size: 13px;
      }

      .lead-modal-card input,
      .lead-modal-card textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: #101828;
      }

      .lead-modal-card [data-close-lead] {
        border: 0;
        background: transparent;
        color: #475467;
        font-size: 24px;
        cursor: pointer;
      }

      .lead-status {
        min-height: 18px;
        color: #0e7c66;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main id="publicSite" class="site-preview">
      <div class="public-empty">Loading published site...</div>
    </main>
    <script src="luma-config.js?v=1781138876"></script>
    <script src="site-viewer.js?v=11"></script>
  </body>
</html>
