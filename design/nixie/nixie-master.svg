      <path id="success-right-arm" class="stroke-main" fill="url(#nixieSkin)" d="M468 330 C518 306 550 268 548 226 C547 200 526 190 508 207 C493 222 497 247 506 269 C486 285 464 304 445 324 Z"/>
      <g id="success-confetti">
