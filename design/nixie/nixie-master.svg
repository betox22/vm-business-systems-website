    <g id="layer-code-texture" opacity="0.45" fill="#eaffff" font-family="Consolas, monospace" font-size="13">
      <text x="333" y="338">function()</text>
      <text x="372" y="375">0104</text>
      <text x="313" y="418">store.build</text>
      <text x="358" y="466">flow.ai</text>
      <text x="326" y="510">schema()</text>
    </g>

