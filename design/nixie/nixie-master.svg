      <path id="tail-left-drop" class="stroke-main" fill="url(#nixieSkin)" d="M282 445 C238 493 233 566 266 604 C288 629 319 608 309 572 C297 529 315 491 347 462 Z"/>
      <path id="fluid-side-splash" class="stroke-main" fill="#81fff5" opacity="0.86" d="M523 206 C578 217 607 262 587 308 C576 332 598 350 623 329 C663 295 644 225 594 199 C563 183 535 184 516 194 Z"/>
      <circle cx="255" cy="620" r="13" fill="#83fff6" stroke="#13296b" stroke-width="6"/>
      <circle cx="548" cy="170" r="11" fill="#a98cff" stroke="#13296b" stroke-width="6"/>
    </g>

